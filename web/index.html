<!doctype html>
<html lang="en">
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- SEO Metadata -->
    <title>VanishLink – Secure Messaging, Voice & Video Calls</title>
    <meta name="description" content="VanishLink is a privacy-focused communication platform for secure messaging, voice calls, and video calls across devices. Fast, secure, and designed for modern communication." />
    <meta name="keywords" content="VanishLink, secure messaging, private chat, voice calls, video calls, WebRTC, encrypted communication, realtime chat, messaging platform, communication app" />
    <meta name="author" content="VanishLink" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#7669E2" />
    <meta name="application-name" content="VanishLink" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vanishlink.app/" />
    <meta property="og:site_name" content="VanishLink" />
    <meta property="og:title" content="VanishLink – Secure Messaging, Voice & Video Calls" />
    <meta property="og:description" content="VanishLink is a privacy-focused communication platform for secure messaging, voice calls, and video calls across devices. Fast, secure, and designed for modern communication." />
    <meta property="og:image" content="icons/Icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://vanishlink.app/" />
    <meta name="twitter:title" content="VanishLink – Secure Messaging, Voice & Video Calls" />
    <meta name="twitter:description" content="VanishLink is a privacy-focused communication platform for secure messaging, voice calls, and video calls across devices. Fast, secure, and designed for modern communication." />
    <meta name="twitter:image" content="icons/Icon-512.png" />

    <!-- Progressive Web App / iOS branding -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VanishLink" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0B0F19; /* Deep Slate dark background */
      }

      @media (prefers-color-scheme: light) {
        html, body {
          background-color: #F8FAFC; /* Slate-50 light background */
        }
      }

      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
        background-color: #0B0F19;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #F8FAFC;
        overflow: hidden;
      }

      @media (prefers-color-scheme: light) {
        #splash-screen {
          background-color: #F8FAFC;
          color: #0F172A;
        }
      }

      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      /* Ambient background blobs for glassmorphic depth */
      .ambient-orb {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        z-index: 1;
        pointer-events: none;
      }

      .orb-primary {
        top: 20%;
        left: 25%;
        background-color: #7669E2;
        animation: orb-float-1 8s ease-in-out infinite;
      }

      .orb-secondary {
        bottom: 20%;
        right: 25%;
        background-color: #E8669E;
        animation: orb-float-2 8s ease-in-out infinite;
      }

      @keyframes orb-float-1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, -20px) scale(1.1); }
      }

      @keyframes orb-float-2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-30px, 20px) scale(1.1); }
      }

      .splash-card {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 420px;
        width: 85%;
        padding: 40px 24px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.45); /* Glassmorphic card default dark */
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      @media (prefers-color-scheme: light) {
        .splash-card {
          background: rgba(255, 255, 255, 0.65);
          border: 1px solid rgba(15, 23, 42, 0.06);
          box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05);
        }
      }

      .logo-mark {
        position: relative;
        width: 88px;
        height: 88px;
        margin-bottom: 24px;
      }

      .spinner {
        box-sizing: border-box;
        width: 88px;
        height: 88px;
        border: 4px solid rgba(118, 105, 226, 0.15);
        border-radius: 50%;
        border-top: 4px solid #7669E2;
        border-right: 4px solid #E8669E;
        animation: spin 1.2s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .logo-inner {
        position: absolute;
        top: 14px;
        left: 14px;
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #7669E2, #E8669E);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2.5s ease-in-out infinite;
        box-shadow: 0 8px 20px rgba(118, 105, 226, 0.35);
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 8px 20px rgba(118, 105, 226, 0.35);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 12px 28px rgba(232, 102, 158, 0.5);
        }
      }

      .logo-inner svg {
        width: 26px;
        height: 26px;
        fill: #FFFFFF;
      }

      .brand-title {
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin: 0 0 6px 0;
        background: linear-gradient(135deg, #7669E2, #E8669E);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .brand-tagline {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 28px 0;
        color: #94A3B8; /* slate-400 */
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      @media (prefers-color-scheme: light) {
        .brand-tagline {
          color: #475569; /* slate-600 */
        }
      }

      .status-container {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        background-color: #7669E2;
        border-radius: 50%;
        animation: dot-pulse 1.5s ease-in-out infinite;
      }

      @keyframes dot-pulse {
        0%, 100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      .status-text {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: #64748B; /* slate-500 */
        margin: 0;
      }

      @media (prefers-color-scheme: light) {
        .status-text {
          color: #94A3B8; /* slate-400 */
        }
      }

      /* Accessibility Reduced Motion Support */
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation: spin 6s linear infinite; /* Highly slowed down rotation */
        }
        .logo-inner {
          animation: none; /* Disable pulse scaling */
        }
        .orb-primary, .orb-secondary {
          animation: none; /* Disable background floating blobs movement */
        }
        .status-indicator {
          animation: none;
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <script>
      // Smooth fade-out lifecycle hook for the premium splash screen
      (function() {
        var originalRemoveChild = document.body.removeChild;
        document.body.removeChild = function(child) {
          if (child && child.id === 'splash-screen') {
            child.classList.add('fade-out');
            setTimeout(function() {
              originalRemoveChild.call(document.body, child);
            }, 500); // matches CSS transition duration
            return child;
          }
          return originalRemoveChild.call(document.body, child);
        };
      })();
    </script>

    <div id="splash-screen" role="progressbar" aria-valuetext="Preparing secure communication…" aria-label="Branded splash loading screen">
      <div class="ambient-orb orb-primary"></div>
      <div class="ambient-orb orb-secondary"></div>

      <div class="splash-card">
        <div class="logo-mark">
          <div class="spinner"></div>
          <div class="logo-inner">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </div>
        </div>
        <h1 class="brand-title">VanishLink</h1>
        <p class="brand-tagline">Secure Messaging, Voice & Video Calls</p>
        <div class="status-container">
          <div class="status-indicator"></div>
          <p class="status-text">Preparing secure communication…</p>
        </div>
      </div>
    </div>

    <script async src="flutter_bootstrap.js">
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("firebase-messaging-sw.js", {
              scope: "/firebase-cloud-messaging-push-scope",
            })
            .then(
              function (registration) {
                console.log(
                  "[ServiceWorker] Registration successful with scope: ",
                  registration.scope,
                );
              },
              function (err) {
                console.log("[ServiceWorker] Registration failed: ", err);
              },
            );
        });
      }
    </script>
  </body>
</html>
